<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Verify Reset Code</title>

<style>

body{
    margin:0;
    background:#0b1220;
    font-family:Arial,sans-serif;
    color:#e5e7eb;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.card{

    width:420px;

    background:#111827;

    border:1px solid #1f2937;

    border-radius:18px;

    padding:34px;

    box-shadow:
        0 0 30px rgba(37,99,235,0.15);
}

h1{
    margin-top:0;
    margin-bottom:8px;
    color:white;
    font-size:28px;
}

.sub{
    color:#9ca3af;
    font-size:13px;
    line-height:1.6;
    margin-bottom:28px;
}

form{
    display:flex;
    flex-direction:column;
    gap:16px;
}

input{

    width:100%;

    padding:12px;

    background:#0f172a;

    border:1px solid #374151;

    border-radius:10px;

    color:white;

    font-size:14px;

    box-sizing:border-box;
}

input:focus{

    outline:none;

    border-color:#2563eb;

    box-shadow:
        0 0 0 2px rgba(37,99,235,0.20);
}

button{

    margin-top:8px;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:14px;

    font-weight:600;

    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.error{
    margin-bottom:14px;
    background:rgba(239,68,68,0.12);
    border:1px solid rgba(239,68,68,0.30);
    padding:10px;
    border-radius:10px;
    color:#fca5a5;
    font-size:12px;
}

</style>
</head>

<body>

<div class="card">

    <h1>📧 Verify Code</h1>

    <div class="sub">
        Enter the 6-digit verification code sent to your email.
    </div>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        <input
            type="text"
            name="code"
            placeholder="Enter verification code"
            required
        >

        <button type="submit">
            Verify Code
        </button>

    </form>

</div>

</body>
</html>
