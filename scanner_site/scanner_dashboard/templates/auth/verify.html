<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Verify Email</title>

<style>

body {
  margin: 0;
  background: #111827;
  font-family: Arial;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ================= CARD ================= */

.card {
  background: #0f172a;
  padding: 32px;
  border-radius: 14px;
  border: 1px solid #1f2937;
  width: 420px;
  text-align: center;
  box-shadow: 0 0 30px rgba(37,99,235,0.10);
}

h2 {
  color: white;
  margin-bottom: 10px;
}

.small {
  margin-top: 12px;
  font-size: 12px;
  color: #9ca3af;
  line-height: 1.5;
}

/* ================= INPUT ================= */

input {
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #111827;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
}

input:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
}

/* ================= BUTTON ================= */

button {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #1d4ed8;
}

/* ================= ERROR ================= */

.error {
  margin-top: 12px;
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 10px;
  border-radius: 10px;
  color: #fca5a5;
  font-size: 12px;
}

/* ================= SUCCESS ================= */

.success {
  margin-top: 12px;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.3);
  padding: 10px;
  border-radius: 10px;
  color: #86efac;
  font-size: 12px;
}

/* ================= RESEND ================= */

.resend {
  margin-top: 18px;
  font-size: 12px;
  color: #9ca3af;
}

.resend a {
  color: #60a5fa;
  text-decoration: none;
  font-weight: 600;
}

.resend a:hover {
  text-decoration: underline;
}

</style>

</head>

<body>

<div class="card">

  <h2>Verify Your Email</h2>

  <p class="small">
    Enter the 6-digit code sent to your email address to activate your account.
  </p>

  <!-- ================= FORM ================= -->
  <form method="post">

    {% csrf_token %}

    <input type="text" name="code" placeholder="Enter verification code" required>

    <button type="submit">Verify Account</button>

  </form>

  <!-- ================= ERROR MESSAGE ================= -->
  {% if error %}
    <div class="error">
      {{ error }}
    </div>
  {% endif %}

  <!-- ================= SUCCESS MESSAGE ================= -->
  {% if success %}
    <div class="success">
      {{ success }}
    </div>
  {% endif %}

  <!-- ================= HELP TEXT ================= -->
  <p class="small">
    Didn’t receive the code? Check spam or resend below.
  </p>

  <div class="resend">
    <a href="{% url 'resend_code' %}">Resend verification code</a>
  </div>

</div>

</body>
</html>
