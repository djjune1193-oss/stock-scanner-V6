<div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
  
  <a href="/" style="
      padding:6px 12px;
      border-radius:6px;
      background:#007bff;
      color:white;
      text-decoration:none;
  ">
    ← Home
  </a>

  <h2 style="margin:0;">Industry Dashboard</h2>

</div>




<div style="display:flex; flex-wrap:wrap; gap:15px;">

  {% for item in data %}
    <a href="/today/{{ item.Industry|urlencode }}/"
       style="text-decoration:none; color:inherit;">

      <div style="
          width:220px;
          padding:15px;
          border-radius:12px;
          background-color:
            {% if item.RATIO > 0.6 %}#d4edda
            {% elif item.RATIO < 0.4 %}#f8d7da
            {% else %}#fff3cd
            {% endif %};
          box-shadow:0 2px 6px rgba(0,0,0,0.1);
      ">
        <h4>{{ item.Industry }}</h4>
        <p>📈 Up: {{ item.UP }}</p>
        <p>📉 Down: {{ item.DOWN }}</p>
        <p>📊 Total: {{ item.TOTAL }}</p>
        <p><strong>{{ item.RATIO|floatformat:2 }}</strong></p>
      </div>

    </a>
  {% endfor %}

</div>
