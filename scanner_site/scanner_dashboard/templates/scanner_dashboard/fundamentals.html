{% load custom_tags %}





<!DOCTYPE html>
<html>
<head>
    <title>Fundamentals Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        /* Sticky header fix */
        thead th {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #f1f1f1;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">

    <h2 style="margin:0;">📊 Fundamentals Dashboard</h2>

    <div style="display:flex; gap:10px; align-items:center;">

        <!-- BACK BUTTON -->
        <a href="/"
           style="
                padding:8px 12px;
                background:#6c757d;
                color:white;
                text-decoration:none;
                border-radius:6px;
                font-size:13px;
           ">
            ← Back Home
        </a>

        <!-- SEARCH -->
        <form method="GET" style="display:flex; gap:8px;">
            <input type="text"
                   name="search"
                   value="{{ search_query }}"
                   placeholder="Search Ticker..."
                   style="padding:8px; border-radius:6px; border:1px solid #ccc;">

            <button type="submit"
                    style="padding:8px 12px; background:#007bff; color:white; border:none; border-radius:6px;">
                Search
            </button>
        </form>

    </div>

</div>

    <!-- TABLE SCROLL CONTAINER (IMPORTANT FIX) -->
    <div id="tableContainer"
         style="overflow:auto; max-height:80vh; background:white; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

        <table style="min-width:1700px; width:100%; border-collapse:collapse; font-size:12px;">

            <!-- HEADER -->
            <thead>
                <tr>
                    {% for col in columns %}
                    <th style="padding:8px; text-align:center; white-space:nowrap;">
                        <a href="?sort={{ col }}" style="text-decoration:none; color:#333;">
                            {{ col }} ⬇
                        </a>
                    </th>
                    {% endfor %}
                </tr>
            </thead>

            <!-- BODY -->
            <tbody>
                {% for row in rows %}
                <tr id="row-{{ row.TICKER }}"
                    style="
                        text-align:center;
                        border-top:1px solid #eee;
                        background-color:{% if forloop.counter0|divisibleby:2 %}#f9f9f9{% else %}white{% endif %};
                    "
                    onmouseover="this.style.backgroundColor='#eaf3ff'"
                    onmouseout="this.style.backgroundColor=''">

                    {% for col in columns %}

                        {% if col == "TICKER" %}
                        <td style="padding:6px; font-weight:bold;">
                            <a href="{% url 'equity_chart' row.TICKER %}"
                               target="_blank"
                               style="color:#007bff; text-decoration:none;">
                                {{ row.TICKER }}
                            </a>
                        </td>
                        {% else %}
                        <td style="padding:6px;">
                            {{ row|get_item:col }}
                        </td>
                        {% endif %}

                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>
</div>

<!-- ================= JS ================= -->

<script>
function focusTickerRow(ticker) {
    if (!ticker) return;

    ticker = ticker.toUpperCase().trim();

    const row = document.getElementById("row-" + ticker);

    if (row) {
        const container = document.getElementById("tableContainer");

        // scroll inside container (NOT page)
        container.scrollTo({
            top: row.offsetTop - container.offsetTop - 200,
            behavior: "smooth"
        });

        row.style.backgroundColor = "#fff3cd";
    }
}
</script>

<script>
    const searchTicker = "{{ search_query|default:'' }}";

    if (searchTicker) {
        window.onload = function () {
            focusTickerRow(searchTicker);
        }
    }
</script>

</body>
</html>
