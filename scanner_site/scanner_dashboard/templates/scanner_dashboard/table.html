<!DOCTYPE html>
<html>
<head>
    <title>Stock Scanner</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 6px; }
        th { background: #222; color: white; }
    </style>
</head>
<body>

<h2>Scanner Output</h2>

<table>
    <tr>
        {% for col in columns %}
        <th>{{ col }}</th>
        {% endfor %}
    </tr>

    {% for row in rows %}
    <tr>
        {% for cell in row %}
        <td>{{ cell }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

</body>
</html>
